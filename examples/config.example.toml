# qvd-mcp configuration.
#
# Copy this file to the platform-appropriate config path and edit to taste:
#
#   macOS / Linux   ~/.config/qvd-mcp/config.toml
#   Windows         %APPDATA%\qvd-mcp\config.toml
#
# Or skip the file entirely and pass --source on the command line.

# Required. Directory containing your QVD files. Subdirectories are scanned.
source_dir = "/Users/you/Documents/QVDs"

# Optional. Where to keep the Parquet cache. Defaults to the user cache dir
# from platformdirs (e.g. ~/Library/Caches/qvd-mcp on macOS).
# cache_dir = "/Users/you/.cache/qvd-mcp"

# Optional. The QVD reader library. Only "pyqvd" is supported in this release.
# reader = "pyqvd"

# Optional. Hard ceiling on rows returned by the `run_sql` MCP tool (max 10000).
# max_query_rows = 1000

# Optional. Per-query timeout in seconds.
# query_timeout_s = 30

# Optional. Log level: DEBUG, INFO, WARNING, ERROR.
# log_level = "INFO"

# Optional. Debounce window (seconds) for lazy auto-refresh; 0 disables.
# auto_refresh_debounce_s = 10

# Optional. Glob pattern(s), relative to source_dir, that scope which QVDs
# get converted. Defaults to all *.qvd files. Patterns are matched
# recursively (rglob-style) — use subpath fragments for targeted includes.
# include = ["sales/*.qvd", "customers*.qvd"]

# Optional. Glob pattern(s) to exclude after ``include`` is applied.
# Matched against both filename and path-relative-to-source_dir, so
# ``archive/*`` and ``*.backup.qvd`` shapes both work.
# exclude = ["archive/*", "*.backup.qvd"]
